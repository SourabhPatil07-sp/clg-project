name: Calcify AI CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # ----------------------
    # FRONTEND (React + Vite)
    # ----------------------
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Frontend Dependencies
      run: |
        cd Demo/frontend
        npm install

    - name: Build Frontend
      run: |
        cd Demo/frontend
        npm run build

    # ----------------------
    # BACKEND (FastAPI)
    # ----------------------
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install Backend Dependencies
      run: |
        cd Demo/backend
        pip install -r requirements.txt

    - name: Check Backend Import
      run: |
        cd Demo/backend
        python -m py_compile main.py
