services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calcify-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env    
    environment:
      - ENV=development
      - PORT=8000
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - calcify-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calcify-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - calcify-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  calcify-network:
    driver: bridge